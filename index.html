<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Swathi ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #000000, #1a0000);
  font-family: Arial;
  text-align: center;
  color: white;
}

/* Center */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* 💐 Bouquet (guaranteed visible) */
.bouquet {
  font-size: 38px;
  line-height: 1.2;
  margin-bottom: 20px;
  animation: pop 2s infinite alternate;
  text-shadow: 0 0 20px red;
}

@keyframes pop {
  from { transform: scale(1); }
  to { transform: scale(1.15); }
}

/* Text */
h1 {
  font-size: 40px;
  color: #ff4d6d;
  animation: glow 1.5s infinite alternate;
}

p {
  font-size: 22px;
  color: pink;
}

@keyframes glow {
  from { text-shadow: 0 0 10px red; }
  to { text-shadow: 0 0 30px pink; }
}

/* Hearts */
.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Roses falling */
.rose {
  position: absolute;
  font-size: 22px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { top: -10%; }
  100% { top: 110%; }
}
</style>
</head>

<body>

<div class="container">

  <!-- 💐 Bouquet -->
  <div class="bouquet">
    🌹🌹🌹🌹🌹<br>
    🌹🌹🌹🌹🌹<br>
    🌹🌹🌹🌹🌹<br>
    💐
  </div>

  <h1>I love you babe ❤️😍</h1>
  <p>You are my everything 💖</p>
  <p>– Vipul ❤️</p>

</div>

<script>
// Hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

// Roses
function createRose() {
  const rose = document.createElement("div");
  rose.className = "rose";
  rose.innerHTML = "🌹";
  rose.style.left = Math.random() * 100 + "vw";
  rose.style.animationDuration = (Math.random() * 4 + 3) + "s";
  document.body.appendChild(rose);
  setTimeout(() => rose.remove(), 7000);
}
setInterval(createRose, 500);
</script>

</body>
</html>
