<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Swathi ❤️</title>
<style>
body {
 margin: 0;
 overflow: hidden;
 background: radial-gradient(circle at center, #000000, #1a0000);
 font-family: 'Arial', sans-serif;
 text-align: center;
 color: white;
}
/* Main text */
h1 {
 margin-top: 20%;
 font-size: 50px;
 color: #ff4d6d;
 animation: glow 1.5s infinite alternate;
}
p {
 font-size: 24px;
 color: #ffc0cb;
}
/* Glow effect */
@keyframes glow {
 from { text-shadow: 0 0 10px #ff4d6d; }
 to { text-shadow: 0 0 30px #ff99aa; }
}
/* Floating hearts */
.heart {
 position: absolute;
 color: red;
 font-size: 20px;
 animation: floatUp linear infinite;
}
@keyframes floatUp {
 0% { transform: translateY(100vh) scale(1); opacity: 1; }
 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}
/* Roses (emoji rain) */
.rose {
 position: absolute;
 font-size: 24px;
 animation: fall linear infinite;
}
@keyframes fall {
 0% { top: -10%; opacity: 1; }
 100% { top: 110%; opacity: 0; }
}
.footer {
 margin-top: 20px;
 font-size: 18px;
 color: #ff99aa;
}
</style>
</head>
<body>
<h1>I love you babe ❤️😍</h1>
<p>You are my everything 💖</p>
<p class="footer">– Vipul ❤️</p>
<script>
// Floating hearts
function createHeart() {
 const heart = document.createElement("div");
 heart.className = "heart";
 heart.innerHTML = "❤️";
 heart.style.left = Math.random() * 100 + "vw";
 heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
 document.body.appendChild(heart);
 setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);
// Falling roses
function createRose() {
 const rose = document.createElement("div");
 rose.className = "rose";
 rose.innerHTML = "🌹";
 rose.style.left = Math.random() * 100 + "vw";
 rose.style.animationDuration = (Math.random() * 4 + 3) + "s";
 document.body.appendChild(rose);
 setTimeout(() => rose.remove(), 7000);
}
setInterval(createRose, 500);
</script>
</body>
</html>
