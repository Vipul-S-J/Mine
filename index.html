<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Swathi ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

/* Intro */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #000, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
}

#intro button {
  padding: 15px 25px;
  font-size: 20px;
  background: red;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* Puzzle */
#puzzle {
  display: none;
  width: 300px;
  height: 300px;
  margin: 60px auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}

.piece {
  width: 100%;
  height: 100px;
  background-image: url('https://i.imgur.com/8Km9tLL.jpg'); /* 🔥 REPLACE WITH YOUR IMAGE */
  background-size: 300px 300px;
  background-repeat: no-repeat;
  border: 1px solid #222;
  cursor: pointer;
  transition: 0.2s;
}

.piece:hover {
  transform: scale(1.05);
}

/* Message */
#message {
  display: none;
  margin-top: 20px;
}

h1 {
  color: #ff4d6d;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px red; }
  to { text-shadow: 0 0 25px pink; }
}

</style>
</head>

<body>

<div id="intro">
  <button onclick="startGame()">Tap for Surprise ❤️</button>
</div>

<div id="puzzle"></div>

<div id="message">
  <h1>I love you babe ❤️😍</h1>
  <p>You are my everything 💖</p>
  <p>– Vipul ❤️</p>
</div>

<script>

const size = 3;
let tiles = [];
let first = null;

function startGame() {
  document.getElementById("intro").style.display = "none";

  const puzzle = document.getElementById("puzzle");
  puzzle.style.display = "grid";
  puzzle.innerHTML = "";
  tiles = [];

  // create tiles
  for (let i = 0; i < size * size; i++) {
    let tile = document.createElement("div");
    tile.className = "piece";

    let x = i % size;
    let y = Math.floor(i / size);

    tile.style.backgroundPosition = `-${x * 100}px -${y * 100}px`;
    tile.dataset.correct = i;

    tile.addEventListener("click", () => selectTile(tile));

    tiles.push(tile);
  }

  shuffle(tiles);

  tiles.forEach(t => puzzle.appendChild(t));
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function selectTile(tile) {
  if (!first) {
    first = tile;
    tile.style.border = "2px solid red";
  } else {
    swapTiles(first, tile);
    first.style.border = "1px solid #222";
    first = null;

    checkWin();
  }
}

function swapTiles(a, b) {
  let parent = a.parentNode;
  let aIndex = Array.from(parent.children).indexOf(a);
  let bIndex = Array.from(parent.children).indexOf(b);

  if (aIndex < bIndex) {
    parent.insertBefore(b, a);
    parent.insertBefore(a, parent.children[bIndex]);
  } else {
    parent.insertBefore(a, b);
    parent.insertBefore(b, parent.children[aIndex]);
  }
}

function checkWin() {
  let current = document.querySelectorAll(".piece");

  for (let i = 0; i < current.length; i++) {
    if (parseInt(current[i].dataset.correct) !== i) {
      return;
    }
  }

  // 💖 solved
  setTimeout(() => {
    document.getElementById("message").style.display = "block";
  }, 300);
}

</script>

</body>
</html>
