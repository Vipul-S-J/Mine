<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Swathi ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

/* Intro */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #000, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
}

#intro button {
  padding: 15px 25px;
  font-size: 20px;
  background: red;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* Puzzle */
#puzzle {
  display: none;
  width: 300px;
  height: 300px;
  margin: 60px auto;
  position: relative;
}

.piece {
  position: absolute;
  width: 100px;
  height: 100px;
  background-image: url('us.JPG'); /* 🔥 CHANGE THIS */
  background-size: 300px 300px;
  background-repeat: no-repeat;
  border: 1px solid #111;
  cursor: pointer;
  transition: all 0.3s ease;
}

/* Selected */
.selected {
  border: 2px solid red;
}

/* Message */
#message {
  display: none;
  margin-top: 20px;
}

h1 {
  color: #ff4d6d;
}
</style>
</head>

<body>

<div id="intro">
  <button onclick="startGame()">Tap for Surprise ❤️</button>
</div>

<div id="puzzle"></div>

<div id="message">
  <h1>I love you babe ❤️😍</h1>
  <p>You are my everything 💖</p>
  <p>– Vipul ❤️</p>
</div>

<script>

const size = 3;
let pieces = [];
let first = null;

function startGame() {
  document.getElementById("intro").style.display = "none";

  const puzzle = document.getElementById("puzzle");
  puzzle.style.display = "block";
  puzzle.innerHTML = "";
  pieces = [];

  for (let i = 0; i < size * size; i++) {
    const piece = document.createElement("div");
    piece.className = "piece";

    let x = i % size;
    let y = Math.floor(i / size);

    // correct position
    piece.correctX = x * 100;
    piece.correctY = y * 100;

    // current position (start shuffled later)
    piece.style.left = piece.correctX + "px";
    piece.style.top = piece.correctY + "px";

    // image slicing
    piece.style.backgroundPosition = `-${x * 100}px -${y * 100}px`;

    piece.addEventListener("click", () => selectPiece(piece));

    pieces.push(piece);
    puzzle.appendChild(piece);
  }

  shufflePositions();
}

// Shuffle only positions (not elements)
function shufflePositions() {
  let positions = pieces.map(p => ({
    x: p.correctX,
    y: p.correctY
  }));

  positions.sort(() => Math.random() - 0.5);

  pieces.forEach((p, i) => {
    p.style.left = positions[i].x + "px";
    p.style.top = positions[i].y + "px";
  });
}

function selectPiece(piece) {
  if (!first) {
    first = piece;
    piece.classList.add("selected");
  } else {
    swapPieces(first, piece);
    first.classList.remove("selected");
    first = null;

    checkWin();
  }
}

function swapPieces(a, b) {
  let tempX = a.style.left;
  let tempY = a.style.top;

  a.style.left = b.style.left;
  a.style.top = b.style.top;

  b.style.left = tempX;
  b.style.top = tempY;
}

function checkWin() {
  for (let p of pieces) {
    if (p.style.left !== p.correctX + "px" ||
        p.style.top !== p.correctY + "px") {
      return;
    }
  }

  // 💖 solved
  setTimeout(() => {
    document.getElementById("message").style.display = "block";
  }, 300);
}

</script>

</body>
</html>
