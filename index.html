<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Swathi ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  text-align: center;
  color: white;
}

/* Intro */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #000, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#intro button {
  padding: 15px 25px;
  font-size: 20px;
  background: red;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* Puzzle container */
#puzzleContainer {
  display: none;
  position: relative;
  width: 300px;
  height: 300px;
  margin: 80px auto;
}

/* Puzzle pieces */
.piece {
  position: absolute;
  width: 100px;
  height: 100px;
  background-image: url('us.JPG'); /* 🔥 PUT YOUR IMAGE HERE */
  background-size: 300px 300px;
  transition: all 1s ease;
}

/* Final message */
#finalMessage {
  display: none;
}

h1 {
  color: #ff4d6d;
}

</style>
</head>

<body>

<div id="intro">
  <button onclick="startPuzzle()">Tap for Surprise ❤️</button>
</div>

<div id="puzzleContainer"></div>

<div id="finalMessage">
  <h1>I love you babe ❤️😍</h1>
  <p>You are my everything 💖</p>
  <p>– Vipul ❤️</p>
</div>

<script>

const container = document.getElementById("puzzleContainer");
const size = 3; // 3x3 puzzle

function startPuzzle() {
  document.getElementById("intro").style.display = "none";
  container.style.display = "block";

  let pieces = [];

  for (let i = 0; i < size * size; i++) {
    let piece = document.createElement("div");
    piece.className = "piece";

    let x = i % size;
    let y = Math.floor(i / size);

    // correct position
    piece.dataset.correctX = x * 100;
    piece.dataset.correctY = y * 100;

    // background position
    piece.style.backgroundPosition = `-${x * 100}px -${y * 100}px`;

    // random start position
    piece.style.left = Math.random() * window.innerWidth + "px";
    piece.style.top = Math.random() * window.innerHeight + "px";

    container.appendChild(piece);
    pieces.push(piece);
  }

  // Animate into place
  setTimeout(() => {
    pieces.forEach(p => {
      p.style.left = p.dataset.correctX + "px";
      p.style.top = p.dataset.correctY + "px";
    });
  }, 500);

  // After complete → show message
  setTimeout(() => {
    document.getElementById("finalMessage").style.display = "block";
  }, 2500);
}

</script>

</body>
</html>
